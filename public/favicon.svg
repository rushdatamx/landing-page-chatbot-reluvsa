<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer tire -->
  <circle cx="50" cy="50" r="45" fill="#1e40af"/>
  <circle cx="50" cy="50" r="38" fill="#1e3a8a"/>

  <!-- Tire tread pattern -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8 4"/>

  <!-- Inner rim -->
  <circle cx="50" cy="50" r="28" fill="#60a5fa"/>
  <circle cx="50" cy="50" r="22" fill="#93c5fd"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="12" fill="#1e40af"/>
  <circle cx="50" cy="50" r="6" fill="#3b82f6"/>

  <!-- Spokes -->
  <line x1="50" y1="18" x2="50" y2="38" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="62" x2="50" y2="82" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>
  <line x1="18" y1="50" x2="38" y2="50" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>
  <line x1="62" y1="50" x2="82" y2="50" stroke="#1e3a8a" stroke-width="4" stroke-linecap="round"/>

  <!-- Diagonal spokes -->
  <line x1="27" y1="27" x2="41" y2="41" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="73" y1="73" x2="59" y2="59" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="73" y1="27" x2="59" y2="41" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="73" x2="41" y2="59" stroke="#1e3a8a" stroke-width="3" stroke-linecap="round"/>
</svg>
